<script type="text/javascript">
    window.demo = false;
    window.onbeforeunload = function(evt) {
        if(window.currentMode == null)
            return;
        if(window.currentMode != 'STAT_ENTRY')
            return;
        var message = 'Leaving so soon?';
        if (typeof evt == 'undefined') {
            evt = window.event;
        }
        if (evt) {
            evt.returnValue = message;
        }
        return message;
    }
</script>

<script>
    var isIE = (navigator.userAgent.toLowerCase().indexOf("msie") != -1);
    function interceptKeyDown(e) {
        keyCode = e.keyCode;
        if (keyCode == 112) {
            var evt = (document.all ? window.event : e);
            if (isIE) {
                document.onhelp = function() { return false; };
                window.onhelp = function() { return false; };
            }
            evt.returnValue = false;
            evt.keyCode = 0;
            evt.preventDefault();
            evt.stopPropagation();
            return false;
        }
        if (keyCode == 116) {
            if (isIE) { e.keyCode = 505; }
            return false;
        }
    }
    function interceptKeyPress(e) {
        if (!e) {
            if (window.event) e = window.event;
            else return;
        }
        if (typeof (e.which) == 'number') {
            var keyCode = e.keyCode ? e.keyCode : e.which ? e.which : void 0;
            if (e.charCode == null || e.charCode == 0) {
                if (keyCode == 116 || keyCode == 112) {
                    e.stopPropagation();
                    e.preventDefault();
                }
            }
        }
    }
    function attachEventListener(obj, type, func, capture) {
        if (window.addEventListener) {
            obj.addEventListener(type, func, capture);
        } else {
            obj.attachEvent('on' + type, func);
        }
    }
    attachEventListener(document, "keydown", interceptKeyDown, true);
    attachEventListener(document, "keypress", interceptKeyPress, true);
</script>

<style>
    /* Override GWT-rendered Gameday Stats logo */
    #logo {
        content: url('/static/images/gameday-stats-logo-white.png');
    }
</style>

<script>
    /* GWT renders #logo asynchronously — poll until it appears then swap src/alt */
    (function swapLogo() {
        var attempts = 0;
        var timer = setInterval(function() {
            var el = document.getElementById('logo');
            if (el) {
                el.src = '/static/images/gameday-stats-logo-white.png';
                el.alt = 'Gameday Stats';
                el.title = 'Gameday Stats';
                clearInterval(timer);
            }
            if (++attempts > 200) clearInterval(timer);
        }, 100);
    })();

    /* Auto-save every 5s in stat entry — only the main game Save, never modal/dialog Save (add player, etc.) */
    (function autoSavePitchUpdates() {
        var lastClick = 0;
        function isInsideGwtDialog(el) {
            while (el) {
                if (el.classList && el.classList.contains('gwt-DialogBox')) return true;
                el = el.parentElement;
            }
            return false;
        }
        function isVisibleDialogOpen() {
            var boxes = document.querySelectorAll('.gwt-DialogBox');
            for (var i = 0; i < boxes.length; i++) {
                var el = boxes[i];
                var s = window.getComputedStyle(el);
                if (s.display === 'none' || s.visibility === 'hidden' || parseFloat(s.opacity) === 0) continue;
                if (el.offsetWidth > 0 && el.offsetHeight > 0) return true;
            }
            return false;
        }
        function findMainSaveButton() {
            var candidates = document.querySelectorAll('button[title*="Save"], button[title*="save"]');
            for (var i = 0; i < candidates.length; i++) {
                var b = candidates[i];
                if (b.disabled) continue;
                if (!isInsideGwtDialog(b)) return b;
            }
            var btns = document.querySelectorAll('button, .gwt-Button');
            for (var j = 0; j < btns.length; j++) {
                var btn = btns[j];
                if (btn.disabled) continue;
                if (!/^\s*save\s*$/i.test((btn.textContent || '').trim())) continue;
                if (!isInsideGwtDialog(btn)) return btn;
            }
            return null;
        }
        setInterval(function() {
            if (typeof window.currentMode !== 'undefined' && window.currentMode !== 'STAT_ENTRY') return;
            var now = Date.now();
            if (now - lastClick < 4500) return;
            if (isVisibleDialogOpen()) return;
            if (document.activeElement && isInsideGwtDialog(document.activeElement)) return;
            var saveBtn = findMainSaveButton();
            if (saveBtn) {
                try {
                    saveBtn.click();
                    lastClick = now;
                } catch (e) {}
            }
        }, 5000);
    })();
</script>

<body>
<div id="main">
    <div id="databaseStatus"></div>
    <div id="divHistory"></div>

    <div id="statentrydiv" class="statentry"
        url="/action/stats/"
        profile_login="{{ current_user.username }}"
        profile_password="{{ current_user.password_sha256 }}"
        season_id="{{ season_id }}"
        event_id="{{ event_id }}"
        sport_code="{{ sport_code }}"
        event_date="{{ event_date }}"
        forgotpassurl="/login"
        cleanUpStorageMinutesLimit="5"
        error_support_message="Contact your administrator for support.">
    </div>
</div>
