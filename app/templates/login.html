<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Stats Entry</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Helvetica, Arial, sans-serif;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff;
            border-radius: 6px;
            padding: 40px 36px;
            width: 340px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .logo-wrap {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-wrap img {
            max-width: 180px;
            filter: invert(1);
        }
        .logo-wrap h1 {
            font-size: 16px;
            color: #333;
            margin-top: 8px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #555;
            margin-bottom: 4px;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        input[type=text]:focus, input[type=password]:focus {
            border-color: #d94f00;
        }
        .btn {
            display: block;
            width: 100%;
            margin-top: 24px;
            padding: 11px;
            background: #d94f00;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.03em;
        }
        .btn:hover { background: #b84200; }
        .flash {
            background: #ffe0d9;
            color: #c0392b;
            border: 1px solid #f5b7b1;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-wrap">
            <h1>Stats Entry</h1>
        </div>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <form method="post">
            <label for="email">Email</label>
            <input type="text" id="email" name="email" autofocus autocomplete="email">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password">
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
</body>
</html>
